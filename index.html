<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V2A Results</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Cabinet+Grotesk:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ec;
      --surface: #fffefa;
      --surface-2: #ebe6dc;
      --border: #d8d3c8;
      --highlight: #e8ff47;
      --muted: #7e786f;
      --text: #191817;
      --sfx: #2563eb;
      --ambience: #0f9f7a;
      --music: #d97706;
      --dialogue: #db2777;
      --unknown: #64748b;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(245, 242, 236, 0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      height: 52px;
    }

    .nav-logo {
      font-family: 'Cabinet Grotesk', sans-serif;
      font-size: 17px;
      font-weight: 900;
    }

    .nav-logo span { background: var(--highlight); padding: 0 4px; }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav-links a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    .hero {
      padding: 76px 40px 48px;
      max-width: 1180px;
      margin: 0 auto;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards;
    }

    .hero-eyebrow {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .hero h1 {
      font-family: 'Cabinet Grotesk', sans-serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.03em;
      margin-bottom: 24px;
    }

    .hero h1 em { font-style: normal; background: var(--highlight); padding: 0 6px; }
    .hero-meta { display: flex; flex-wrap: wrap; gap: 20px 32px; font-size: 12px; color: var(--muted); }
    .hero-meta span::before { content: '// '; }

    .samples {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 40px 96px;
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 20px;
      margin-bottom: 36px;
    }

    .sample-card {
      margin-bottom: 72px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease forwards;
    }

    .sample-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 16px;
      margin-bottom: 18px;
    }

    .sample-kicker {
      display: flex;
      align-items: baseline;
      gap: 14px;
      min-width: 0;
    }

    .sample-index {
      font-family: 'Cabinet Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 900;
      color: var(--muted);
      min-width: 32px;
    }

    .sample-title {
      font-family: 'Cabinet Grotesk', sans-serif;
      font-size: 23px;
      font-weight: 700;
      letter-spacing: -0.01em;
      overflow-wrap: anywhere;
    }

    .sample-stats {
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .video-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 18px;
      margin-bottom: 18px;
    }

    .video-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .video-label::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border);
    }

    .video-label.generated::before { background: var(--highlight); outline: 1px solid #aaa; }

    .video-shell {
      position: relative;
      background: #050505;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    video {
      width: 100%;
      background: #000;
      display: block;
      outline: none;
      aspect-ratio: 16 / 9;
    }

    .asset-warning {
      position: absolute;
      inset: auto 10px 10px 10px;
      display: none;
      padding: 8px 10px;
      background: rgba(25, 24, 23, 0.82);
      color: #fff;
      border-radius: 4px;
      font-size: 10px;
      letter-spacing: 0.04em;
    }

    .video-shell.is-missing .asset-warning { display: block; }

    .mix-panel {
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      overflow: hidden;
    }

    .mix-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    .mix-title {
      min-width: 0;
    }

    .mix-title strong {
      display: block;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .mix-title span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mode-toggle {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--border);
      background: var(--surface-2);
      border-radius: 5px;
      overflow: hidden;
    }

    .mode-button,
    .row-play-button,
    .track-button,
    .solo-button {
      appearance: none;
      border: 0;
      font: inherit;
      cursor: pointer;
      color: var(--text);
      background: transparent;
    }

    .mode-button {
      padding: 8px 12px;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .mode-button.is-active {
      background: var(--text);
      color: #fff;
    }

    .timeline-ruler {
      position: relative;
      display: grid;
      grid-template-columns: 46px 238px minmax(260px, 1fr);
      height: 32px;
      padding: 0;
      background: #f8f6f0;
      border-bottom: 1px solid var(--border);
    }

    .ruler-track {
      position: relative;
      grid-column: 3;
      height: 100%;
      min-width: 0;
      margin: 0 14px;
      cursor: pointer;
      touch-action: none;
    }

    .ruler-line {
      position: absolute;
      top: 15px;
      left: 0;
      right: 0;
      height: 1px;
      background: #d6d0c4;
    }

    .playhead {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 2px;
      background: #111;
      transform: translateX(-1px);
      z-index: 4;
      will-change: left;
    }

    .playhead::before {
      content: '';
      position: absolute;
      top: 6px;
      left: 50%;
      width: 8px;
      height: 8px;
      background: #111;
      transform: translateX(-50%) rotate(45deg);
    }

    .time-readout {
      position: absolute;
      top: 8px;
      right: 14px;
      color: var(--muted);
      font-size: 10px;
      background: rgba(248, 246, 240, 0.88);
      padding-left: 8px;
      z-index: 5;
    }

    .tracks {
      display: grid;
    }

    .track-row {
      display: grid;
      grid-template-columns: 46px 238px minmax(260px, 1fr);
      gap: 0;
      min-height: 74px;
      border-bottom: 1px solid #eee8dd;
    }

    .track-row:last-child { border-bottom: none; }
    .track-row.is-muted { opacity: 0.48; }
    .track-row.is-previewing { background: #fffdf1; }

    .row-play-cell {
      display: grid;
      place-items: center;
      border-right: 1px solid #eee8dd;
      padding: 12px 8px;
    }

    .row-play-button {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: #fff;
      color: var(--text);
      font-size: 10px;
      line-height: 1;
      display: inline-grid;
      place-items: center;
    }

    .row-play-button.is-active {
      background: var(--highlight);
      border-color: #a7ad28;
    }

    .track-meta {
      padding: 12px 14px;
      border-right: 1px solid #eee8dd;
      min-width: 0;
    }

    .track-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      min-width: 0;
    }

    .track-type {
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 7px;
      border-radius: 3px;
      min-width: 70px;
      text-align: center;
      font-weight: 600;
      color: #fff;
      background: var(--unknown);
    }

    .track-type.sfx { background: var(--sfx); }
    .track-type.ambience { background: var(--ambience); }
    .track-type.music { background: var(--music); }
    .track-type.dialogue { background: var(--dialogue); }

    .track-button {
      width: 28px;
      height: 22px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
      font-size: 10px;
      font-weight: 600;
    }

    .track-button.is-off { color: var(--muted); background: #eee9de; }

    .solo-button {
      height: 22px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fff;
      padding: 0 7px;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .solo-button.is-active { background: var(--highlight); border-color: #b5be30; }

    .track-label {
      font-size: 12px;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 4px;
      overflow-wrap: anywhere;
    }

    .track-source,
    .track-model {
      color: var(--muted);
      font-size: 10px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .track-timeline {
      position: relative;
      min-width: 0;
      padding: 12px 14px;
    }

    .event-lane {
      position: relative;
      height: 24px;
      border-radius: 3px;
      background: #eee9de;
      overflow: hidden;
      cursor: pointer;
      touch-action: none;
    }

    .event-segment {
      position: absolute;
      top: 4px;
      height: 16px;
      min-width: 3px;
      border-radius: 3px;
      background: var(--unknown);
      opacity: 0.88;
    }

    .event-segment.sfx { background: var(--sfx); }
    .event-segment.ambience { background: var(--ambience); }
    .event-segment.music { background: var(--music); }
    .event-segment.dialogue { background: var(--dialogue); }

    .track-playhead {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 2px;
      background: rgba(25, 24, 23, 0.78);
      pointer-events: none;
      z-index: 3;
      will-change: left;
    }

    .status-line {
      min-height: 18px;
      color: var(--muted);
      font-size: 10px;
      padding: 0 14px 12px;
    }

    .divider { border: none; border-top: 1px solid var(--border); margin: 0 0 72px; }

    footer {
      border-top: 1px solid var(--border);
      padding: 24px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      font-size: 11px;
      color: var(--muted);
    }

    footer a { color: var(--text); text-decoration: none; border-bottom: 1px solid var(--border); }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 820px) {
      nav, .hero, .samples { padding-left: 20px; padding-right: 20px; }
      nav { height: auto; min-height: 52px; gap: 18px; }
      .nav-links { gap: 18px; }
      .hero { padding-top: 52px; }
      .video-row, .sample-header, .mix-header { grid-template-columns: 1fr; }
      .sample-stats { white-space: normal; }
      .timeline-ruler { grid-template-columns: 1fr; }
      .ruler-track { grid-column: 1; }
      .track-row { grid-template-columns: 42px 1fr; }
      .track-timeline { grid-column: 1 / -1; }
      .row-play-cell { border-bottom: 1px solid #eee8dd; }
      .track-meta { border-right: none; border-bottom: 1px solid #eee8dd; }
      .track-timeline { padding-top: 10px; }
      footer { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-logo">V2A <span>Results</span></div>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Results</a></li>
      <li><a href="demo.html">Demo</a></li>
    </ul>
  </nav>

  <div class="hero">
    <p class="hero-eyebrow">Video-to-Audio Generation</p>
    <h1>Generated<br /><em>Sound</em><br />Samples</h1>
    <div class="hero-meta">
      <span>원본 영상 + 합성 영상</span>
      <span>Full mix / track solo playback</span>
      <span>트랙별 sound source, category, routed model</span>
    </div>
  </div>

  <section class="samples">
    <p class="section-label">Samples - baseline + YouTube clip</p>
    <div id="samples"></div>
  </section>

  <footer>
    <span>V2A Pipeline - Generation Results</span>
    <a href="demo.html">Demo Video</a>
  </footer>

    const OUTPUT1_CLIPS = {
      v0: `
        198f8783-f055-4ca0-918d-ce9d29aade59 8.577 1.920

      `,
    };

    const OUTPUT1_META = [
      { id: 'v0', title: 'YouTube Clip', originalVideo: 'video/download.mp4', frameCount: 318, duration: 10.6 },
    ];

    function output1Clips(version) {
      return OUTPUT1_CLIPS[version].trim().split('\n').map((line) => {
        const [id, startSeconds, durationSeconds] = line.trim().split(/\s+/);
        return {
          id,
          startSeconds: Number(startSeconds),
          durationSeconds: Number(durationSeconds),
        };
      });
    }

    function secondsToFrame(seconds, sample) {
      return Math.max(0, Math.min(sample.frameCount, Math.round(seconds / sample.duration * sample.frameCount)));
    }

    function makeOutput1Sample(meta) {
      const sourceId = `output1-${meta.id}-source`;
      const clips = output1Clips(meta.id);
      return {
        id: `output1-${meta.id}`,
        title: meta.title || `Output1 ${meta.id.toUpperCase()}`,
        frameCount: meta.frameCount,
        duration: meta.duration,
        originalVideo: meta.originalVideo,
        generatedVideo: `output1/${meta.id}_synthesized.mp4`,
        audioBasePath: `output1/${meta.id}`,
        sources: [{ id: sourceId, label: `${meta.title || `Output1 ${meta.id.toUpperCase()}`} audio tracks`, type: 'generated_tracks' }],
        tracks: clips.map((clip, index) => ({
          id: clip.id,
          type: 'sfx',
          label: `Audio Track ${String(index + 1).padStart(2, '0')}`,
          source: sourceId,
          mode: 'vta',
        })),
        events: clips.map((clip) => ({
          id: clip.id,
          track: clip.id,
          start: secondsToFrame(clip.startSeconds, meta),
          end: Math.max(
            secondsToFrame(clip.startSeconds, meta) + 1,
            secondsToFrame(clip.startSeconds + clip.durationSeconds, meta),
          ),
        })),
      };
    }

    const ALL_RESULTS = RESULTS.concat(OUTPUT1_META.map(makeOutput1Sample));

    const CATEGORY_LABELS = {
      sfx: 'SFX',
      ambience: 'Ambience',
      music: 'Music',
      dialogue: 'Dialogue',
    };

    const $ = (selector, root = document) => root.querySelector(selector);
    const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));
    let activePreviewController = null;

    function el(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== undefined) node.textContent = text;
      return node;
    }

    function formatTime(value) {
      if (!Number.isFinite(value) || value < 0) return '0:00.0';
      const minutes = Math.floor(value / 60);
      const seconds = value - minutes * 60;
      return `${minutes}:${seconds.toFixed(1).padStart(4, '0')}`;
    }

    function safePercent(value) {
      return `${Math.max(0, Math.min(100, value)).toFixed(3)}%`;
    }

    function makeTitle(sample) {
      if (sample.title) return sample.title;
      const names = sample.sources.slice(0, 3).map((source) => source.label).filter(Boolean);
      return names.length ? names.join(' / ') : `Sample ${sample.id}`;
    }

    function sourceLabel(sample, sourceId) {
      if (!sourceId) return 'Global mix';
      const source = sample.sources.find((item) => item.id === sourceId);
      return source ? source.label : 'Unknown source';
    }

    function eventsForTrack(sample, trackId) {
      return sample.events
        .filter((event) => event.track === trackId)
        .sort((a, b) => a.start - b.start || a.end - b.end);
    }

    function modelLabel(mode) {
      if (mode === 'vta') return 'V2A';
      if (mode === 'tta') return 'T2A';
      if (mode === 'hybrid') return 'V2A/T2A';
      return 'Model N/A';
    }

    function renderSamples() {
      const root = $('#samples');
      ALL_RESULTS.forEach((sample, index) => {
        const card = el('article', 'sample-card');
        card.style.animationDelay = `${0.08 * (index + 1)}s`;
        card.dataset.sampleId = sample.id;

        const header = el('div', 'sample-header');
        const kicker = el('div', 'sample-kicker');
        kicker.append(el('span', 'sample-index', String(index + 1).padStart(2, '0')));
        kicker.append(el('h2', 'sample-title', makeTitle(sample)));
        header.append(kicker);
        header.append(el('div', 'sample-stats', `${sample.tracks.length} tracks / ${sample.events.length} events`));
        card.append(header);

        const videoRow = el('div', 'video-row');
        videoRow.append(makeVideoBlock('원본 영상', sample.originalVideo || `data/${sample.id}.mp4`, false));
        videoRow.append(makeVideoBlock('합성 영상', sample.generatedVideo || `output/${sample.id}_synthesized.mp4`, true, sample.id));
        card.append(videoRow);
        card.append(makeTrackPanel(sample));

        root.append(card);
        if (index < ALL_RESULTS.length - 1) root.append(el('hr', 'divider'));
      });

      ALL_RESULTS.forEach((sample) => new SampleController(sample, document.querySelector(`[data-sample-id="${sample.id}"]`)));
    }

    function makeVideoBlock(label, src, generated, sampleId) {
      const block = el('div', 'video-block');
      block.append(el('div', `video-label${generated ? ' generated' : ''}`, label));
      const shell = el('div', 'video-shell');
      const video = document.createElement('video');
      video.controls = true;
      video.preload = 'metadata';
      video.playsInline = true;
      video.src = src;
      if (generated) video.dataset.role = 'generated';
      if (sampleId) video.dataset.sampleVideo = sampleId;
      video.addEventListener('error', () => shell.classList.add('is-missing'));
      shell.append(video);
      shell.append(el('div', 'asset-warning', `missing asset: ${src}`));
      block.append(shell);
      return block;
    }

    function makeTrackPanel(sample) {
      const panel = el('section', 'mix-panel');
      panel.dataset.trackPanel = sample.id;

      const header = el('div', 'mix-header');
      const title = el('div', 'mix-title');
      title.append(el('strong', null, 'Sound Design Tracks'));
      title.append(el('span', null, `${sample.events.length} audio files from ${sample.audioBasePath || `output/${sample.id}`}/`));
      header.append(title);

      const fullButton = el('button', 'mode-button is-active', 'Full Mix');

      const ruler = el('div', 'timeline-ruler');
      const rulerTrack = el('div', 'ruler-track');
      rulerTrack.append(el('div', 'ruler-line'));
      rulerTrack.append(el('div', 'playhead'));
      ruler.append(rulerTrack);
      ruler.append(el('div', 'time-readout', '0:00.0 / 0:00.0'));
      panel.append(ruler);

      const tracks = el('div', 'tracks');
      sample.tracks.forEach((track) => tracks.append(makeTrackRow(sample, track)));
      panel.append(tracks);
      panel.append(el('div', 'status-line'));

      top.append(power, solo);

      meta.append(el('div', 'track-source', `source: ${sourceLabel(sample, track.source)}`));

      });
      lane.append(el('div', 'track-playhead'));
      timeline.append(lane);
      row.append(timeline);
      return row;
    }

    class SampleController {
      constructor(sample, card) {
        this.sample = sample;
        this.card = card;
        this.video = $('[data-role="generated"]', card);
        this.panel = $('[data-track-panel]', card);
        this.mode = 'full';
        this.enabledTracks = new Set(sample.tracks.map((track) => track.id));
        this.soloTrack = null;
        this.audioContext = null;
        this.bufferPromises = new Map();
        this.sources = [];
        this.previewTrackId = null;
        this.previewButton = null;
        this.scheduleToken = 0;
        this.rafId = null;
        this.isLoading = false;
        this.isStartingPreview = false;
        this.ignoreNextPause = false;
        this.isScrubbing = false;

        this.bind();
        this.syncModeButtons();
        this.updatePlayhead();
      }

      bind() {
        $$('[data-mode]', this.panel).forEach((button) => {
          button.addEventListener('click', () => this.setMode(button.dataset.mode));
        });

        $$('[data-action="toggle-track"]', this.panel).forEach((button) => {
          button.addEventListener('click', () => {
            this.ensureSoloMode();
            const trackId = button.dataset.trackId;
            if (this.enabledTracks.has(trackId)) {
              this.enabledTracks.delete(trackId);
            } else {
              this.enabledTracks.add(trackId);
            }
            this.soloTrack = null;
            this.syncTrackButtons();
            this.reschedule();
          });
        });

        $$('[data-action="solo-track"]', this.panel).forEach((button) => {
          button.addEventListener('click', () => {
            this.ensureSoloMode();
            const trackId = button.dataset.trackId;
            if (this.soloTrack === trackId) {
              this.soloTrack = null;
              this.enabledTracks = new Set(this.sample.tracks.map((track) => track.id));
            } else {
              this.soloTrack = trackId;
              this.enabledTracks = new Set([trackId]);
            }
            this.syncTrackButtons();
            this.reschedule();
          });
        });

        $$('[data-action="play-row"]', this.panel).forEach((button) => {
          button.addEventListener('click', () => {
            this.playRowPreview(button.dataset.trackId, button);
          });
        });

        this.bindTimelineSeeking();

        ['play', 'seeked', 'ratechange'].forEach((eventName) => {
          this.video.addEventListener(eventName, () => {
            this.updatePlayhead();
            if (this.isStartingPreview || this.isScrubbing) return;
            if (this.previewTrackId) {
              this.scheduleRowPreview();
            } else if (this.mode === 'solo') {
              this.reschedule();
            }
          });
        });

        ['pause', 'ended', 'emptied'].forEach((eventName) => {
          this.video.addEventListener(eventName, () => {
            if (eventName === 'pause' && this.ignoreNextPause) {
              this.ignoreNextPause = false;
              return;
            }
            if (this.isStartingPreview) return;
            if (this.previewTrackId) {
              this.stopRowPreview({ pauseVideo: false });
            } else {
              this.stopSources();
            }
          });
        });

        this.video.addEventListener('loadedmetadata', () => this.updatePlayhead());
        this.video.addEventListener('timeupdate', () => this.updatePlayhead());
      }

      bindTimelineSeeking() {
        $$('.ruler-track, .event-lane', this.panel).forEach((target) => {
          target.addEventListener('pointerdown', (event) => this.beginTimelineSeek(event, target));
        });
      }

      beginTimelineSeek(event, target) {
        if (event.button !== undefined && event.button !== 0) return;
        event.preventDefault();
        this.isScrubbing = true;
        this.stopSources();
        if (target.setPointerCapture && event.pointerId !== undefined) {
          target.setPointerCapture(event.pointerId);
        }

        const move = (moveEvent) => this.seekFromPointer(moveEvent, target);
        const finish = (finishEvent) => {
          this.seekFromPointer(finishEvent, target);
          cleanup();
          this.finishTimelineSeek();
        };
        const cancel = () => {
          cleanup();
          this.finishTimelineSeek();
        };
        const cleanup = () => {
          target.removeEventListener('pointermove', move);
          target.removeEventListener('pointerup', finish);
          target.removeEventListener('pointercancel', cancel);
        };

        this.seekFromPointer(event, target);
        target.addEventListener('pointermove', move);
        target.addEventListener('pointerup', finish, { once: true });
        target.addEventListener('pointercancel', cancel, { once: true });
      }

      seekFromPointer(event, target) {
        const rect = target.getBoundingClientRect();
        if (!rect.width) return;
        const percent = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
        const duration = this.video.duration || this.sample.frameCount / 30;
        this.video.currentTime = percent * duration;
        this.updatePlayhead();
      }

      finishTimelineSeek() {
        this.isScrubbing = false;
        if (this.previewTrackId && !this.video.paused && !this.video.ended) {
          this.scheduleRowPreview();
        } else if (this.mode === 'solo' && !this.video.paused && !this.video.ended) {
          this.reschedule();
        }
      }

      ensureSoloMode() {
        if (this.mode !== 'solo') this.setMode('solo');
      }

      setMode(mode) {
        if (this.previewTrackId) this.stopRowPreview({ pauseVideo: false, restoreMuted: false, updateStatus: false });
        this.mode = mode;
        this.video.muted = mode === 'solo';
        this.syncModeButtons();
        this.syncTrackButtons();
        this.stopSources();
        if (mode === 'solo') {
          this.preloadAll();
          if (!this.video.paused) this.reschedule();
        }
      }

      syncModeButtons() {
        $$('[data-mode]', this.panel).forEach((button) => {
          button.classList.toggle('is-active', button.dataset.mode === this.mode);
        });
        this.setStatus(this.mode === 'solo' ? 'Track solo mode' : 'Full mix from synthesized video');
      }

      syncTrackButtons() {
        this.sample.tracks.forEach((track) => {
          const row = $(`[data-track-id="${track.id}"]`, this.panel);
          const enabled = this.enabledTracks.has(track.id);
          const previewing = this.previewTrackId === track.id;
          row.classList.toggle('is-muted', !enabled && !previewing);
          row.classList.toggle('is-previewing', previewing);
          const power = $('[data-action="toggle-track"]', row);
          const solo = $('[data-action="solo-track"]', row);
          const play = $('[data-action="play-row"]', row);
          power.textContent = enabled ? 'ON' : 'OFF';
          power.classList.toggle('is-off', !enabled);
          solo.classList.toggle('is-active', this.soloTrack === track.id);
          play.textContent = previewing ? '■' : '▶';
          play.classList.toggle('is-active', previewing);
        });
      }

      setStatus(text) {
        $('.status-line', this.panel).textContent = text || '';
      }

      async getAudioContext() {
        if (!this.audioContext) {
          const Context = window.AudioContext || window.webkitAudioContext;
          this.audioContext = new Context();
        }
        if (this.audioContext.state === 'suspended') await this.audioContext.resume();
        return this.audioContext;
      }

      preloadAll() {
        if (this.isLoading) return;
        this.isLoading = true;
        this.setStatus('Loading track audio...');
        Promise.allSettled(this.sample.events.map((event) => this.loadBuffer(event)))
          .then((results) => {
            const failed = results.filter((result) => result.status === 'rejected').length;
            this.setStatus(failed ? `Track solo mode - ${failed} missing audio file(s)` : 'Track solo mode');
          })
          .finally(() => {
            this.isLoading = false;
          });
      }

      loadBuffer(event) {
        if (this.bufferPromises.has(event.id)) return this.bufferPromises.get(event.id);
        const audioBasePath = this.sample.audioBasePath || `output/${this.sample.id}`;
        const audioSrc = event.src || `${audioBasePath}/${event.id}.wav`;
        const promise = this.getAudioContext()
          .then((context) => fetch(audioSrc)
            .then((response) => {
              if (!response.ok) throw new Error(`missing audio: ${audioSrc}`);
              return response.arrayBuffer();
            })
            .then((arrayBuffer) => context.decodeAudioData(arrayBuffer)));
        this.bufferPromises.set(event.id, promise);
        return promise;
      }

      ensureVideoReady() {
        if (this.video.readyState >= 1) return Promise.resolve();
        return new Promise((resolve, reject) => {
          const cleanup = () => {
            this.video.removeEventListener('loadedmetadata', handleReady);
            this.video.removeEventListener('error', handleError);
          };
          const handleReady = () => {
            cleanup();
            resolve();
          };
          const handleError = () => {
            cleanup();
            reject(new Error('video metadata unavailable'));
          };
          this.video.addEventListener('loadedmetadata', handleReady, { once: true });
          this.video.addEventListener('error', handleError, { once: true });
        });
      }

      async loadTrackBuffers(trackId) {
        const events = eventsForTrack(this.sample, trackId);
        const results = await Promise.allSettled(events.map((event) => this.loadBuffer(event)
          .then((buffer) => ({ event, buffer }))));
        return {
          playable: results.filter((result) => result.status === 'fulfilled').map((result) => result.value),
          failed: results.filter((result) => result.status === 'rejected').length,
          total: events.length,
        };
      }

      async playRowPreview(trackId, button) {
        if (this.previewTrackId === trackId && this.previewButton === button) {
          this.stopRowPreview();
          return;
        }

        if (activePreviewController && activePreviewController !== this) {
          activePreviewController.stopRowPreview();
        }
        if (this.previewTrackId) this.stopRowPreview();

        this.stopSources();
        const token = ++this.scheduleToken;
        this.previewTrackId = trackId;
        this.previewButton = button;
        activePreviewController = this;
        this.video.muted = true;
        this.syncTrackButtons();
        this.setStatus('Loading row audio...');
        this.isStartingPreview = true;

        try {
          await this.getAudioContext();
          await this.ensureVideoReady();
          if (!this.video.paused) {
            this.ignoreNextPause = true;
            this.video.pause();
          }
          const duration = this.video.duration || 0;
          if (this.video.ended || (duration && this.video.currentTime >= duration - 0.05)) {
            this.video.currentTime = 0;
          }
          const loaded = await this.loadTrackBuffers(trackId);
          if (token !== this.scheduleToken || this.previewTrackId !== trackId) return;
          if (!loaded.playable.length) {
            this.stopRowPreview({ pauseVideo: false });
            this.setStatus(loaded.total ? `Row preview unavailable - ${loaded.failed} missing audio file(s)` : 'Row preview unavailable - no audio events');
            return;
          }

          await this.video.play();
          if (token !== this.scheduleToken || this.previewTrackId !== trackId) return;
          this.scheduleLoadedEvents(loaded.playable, token);
          this.setStatus(loaded.failed ? `Row preview - ${loaded.failed} missing audio file(s)` : 'Row preview');
        } catch (error) {
          if (token === this.scheduleToken) {
            this.stopRowPreview({ pauseVideo: false });
            this.setStatus('Row preview unavailable');
          }
        } finally {
          this.isStartingPreview = false;
        }
      }

      async scheduleRowPreview() {
        if (!this.previewTrackId || this.video.paused || this.video.ended) return;
        const trackId = this.previewTrackId;
        const token = ++this.scheduleToken;
        const loaded = await this.loadTrackBuffers(trackId);
        if (token !== this.scheduleToken || this.previewTrackId !== trackId || this.video.paused) return;
        if (!loaded.playable.length) {
          this.stopRowPreview();
          this.setStatus(loaded.total ? `Row preview unavailable - ${loaded.failed} missing audio file(s)` : 'Row preview unavailable - no audio events');
          return;
        }
        this.scheduleLoadedEvents(loaded.playable, token);
        if (loaded.failed) this.setStatus(`Row preview - ${loaded.failed} missing audio file(s)`);
      }

      scheduleLoadedEvents(playable, token) {
        if (!this.audioContext || token !== this.scheduleToken || !this.previewTrackId || this.video.paused) return;

        this.stopSources(false);
        const rate = Math.max(0.05, Math.abs(this.video.playbackRate || 1));
        const now = this.audioContext.currentTime;
        const duration = this.video.duration || this.sample.frameCount / 30;
        const videoTime = this.video.currentTime || 0;

        playable.forEach(({ event, buffer }) => {
          if (token !== this.scheduleToken || !this.previewTrackId || this.video.paused) return;
          const start = event.start / this.sample.frameCount * duration;
          const end = event.end / this.sample.frameCount * duration;
          if (end <= videoTime || start >= duration) return;

          const offset = Math.max(0, videoTime - start);
          if (offset >= buffer.duration) return;
          const wait = Math.max(0, (start - videoTime) / rate);
          const playFor = Math.max(0.03, (end - Math.max(videoTime, start)) / rate);
          const source = this.audioContext.createBufferSource();
          source.buffer = buffer;
          source.playbackRate.value = rate;
          source.connect(this.audioContext.destination);
          source.start(now + wait, Math.min(offset, Math.max(0, buffer.duration - 0.01)));
          source.stop(now + wait + playFor);
          source.onended = () => {
            this.sources = this.sources.filter((item) => item !== source);
          };
          this.sources.push(source);
        });
      }

      async reschedule() {
        if (this.mode !== 'solo' || this.video.paused || this.video.ended) return;
        const token = ++this.scheduleToken;
        const context = await this.getAudioContext();
        const activeEvents = this.sample.events.filter((event) => this.enabledTracks.has(event.track));
        await Promise.allSettled(activeEvents.map((event) => this.loadBuffer(event)));
        if (token !== this.scheduleToken || this.mode !== 'solo' || this.video.paused) return;

        this.stopSources(false);
        const rate = Math.max(0.05, Math.abs(this.video.playbackRate || 1));
        const now = context.currentTime;
        const duration = this.video.duration || this.sample.frameCount / 30;
        const videoTime = this.video.currentTime || 0;

        activeEvents.forEach((event) => {
          const bufferPromise = this.bufferPromises.get(event.id);
          if (!bufferPromise) return;
          bufferPromise.then((buffer) => {
            if (token !== this.scheduleToken || this.mode !== 'solo' || this.video.paused) return;
            const start = event.start / this.sample.frameCount * duration;
            const end = event.end / this.sample.frameCount * duration;
            if (end <= videoTime || start >= duration) return;

            const offset = Math.max(0, videoTime - start);
            if (offset >= buffer.duration) return;
            const wait = Math.max(0, (start - videoTime) / rate);
            const playFor = Math.max(0.03, (end - Math.max(videoTime, start)) / rate);
            const source = context.createBufferSource();
            source.buffer = buffer;
            source.playbackRate.value = rate;
            source.connect(context.destination);
            source.start(now + wait, Math.min(offset, Math.max(0, buffer.duration - 0.01)));
            source.stop(now + wait + playFor);
            source.onended = () => {
              this.sources = this.sources.filter((item) => item !== source);
            };
            this.sources.push(source);
          }).catch(() => {});
        });
      }

      stopSources(bumpToken = true) {
        if (bumpToken) this.scheduleToken++;
        this.sources.forEach((source) => {
          try { source.stop(); } catch (error) {}
        });
        this.sources = [];
      }

      stopRowPreview({ pauseVideo = true, restoreMuted = true, updateStatus = true } = {}) {
        const hadPreview = Boolean(this.previewTrackId);
        this.previewTrackId = null;
        this.previewButton = null;
        if (activePreviewController === this) activePreviewController = null;
        this.stopSources();
        this.syncTrackButtons();
        if (pauseVideo && !this.video.paused) this.video.pause();
        if (restoreMuted) this.video.muted = this.mode === 'solo';
        if (hadPreview && updateStatus) {
          this.setStatus(this.mode === 'solo' ? 'Track solo mode' : 'Full mix from synthesized video');
        }
      }

      updatePlayhead() {
        const duration = this.video.duration || 0;
        const current = this.video.currentTime || 0;
        const percent = duration ? current / duration * 100 : 0;
        const left = safePercent(percent);
        $('.playhead', this.panel).style.left = left;
        $$('.track-playhead', this.panel).forEach((node) => {
          node.style.left = left;
        });
        $('.time-readout', this.panel).textContent = `${formatTime(current)} / ${formatTime(duration)}`;

        if (!this.video.paused && !this.video.ended) {
          this.rafId = requestAnimationFrame(() => this.updatePlayhead());
        } else if (this.rafId) {
          cancelAnimationFrame(this.rafId);
          this.rafId = null;
        }
      }
    }

    renderSamples();
  </script>
</body>
</html>
