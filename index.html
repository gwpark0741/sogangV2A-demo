<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #222;
      --accent: #c8f135;
      --text: #f0f0f0;
      --muted: #555;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 80px 24px 120px;
    }

    /* header */
    header {
      margin-bottom: 64px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.6s ease forwards;
    }

    .tag {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 3px 10px;
      border-radius: 2px;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* video wrapper */
    .video-wrap {
      position: relative;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.7s ease 0.15s forwards;
    }

    .video-wrap::before {
      content: '';
      position: absolute;
      inset: -1px;
      border: 1px solid var(--border);
      border-radius: 6px;
      pointer-events: none;
      z-index: 1;
    }

    /* accent line top */
    .video-wrap::after {
      content: '';
      position: absolute;
      top: -1px;
      left: 0;
      width: 80px;
      height: 2px;
      background: var(--accent);
      border-radius: 1px;
      z-index: 2;
    }

    video {
      display: block;
      width: 100%;
      border-radius: 6px;
      background: #000;
      outline: none;
    }

    /* corner labels */
    .corner {
      position: absolute;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      z-index: 3;
    }
    .corner.tl { top: 10px; left: 12px; }
    .corner.br { bottom: 10px; right: 12px; }

    /* footer */
    footer {
      margin-top: 40px;
      display: flex;
      align-items: center;
      gap: 24px;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.3s forwards;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .footer-text {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="tag">Demo</div>
      <h1>Project<br /><span>Demo.</span></h1>
      <p class="subtitle">// replace this title and video src below</p>
    </header>

    <div class="video-wrap">
      <span class="corner tl">preview</span>
      <span class="corner br">demo.mp4</span>
      <!--
        영상 파일을 레포 루트(또는 원하는 폴더)에 올리고
        아래 src를 파일 경로로 바꿔주세요.
        예) src="demo.mp4"  또는  src="assets/demo.mp4"
      -->
      <video controls preload="metadata" src="demo.mp4"></video>
    </div>

    <footer>
      <div class="dot"></div>
      <span class="footer-text">// add your name or project link here</span>
    </footer>
  </div>
</body>
</html>
